name: Build Atlas Slices

on:
  workflow_dispatch:
    inputs:
      mechanisms:
        description: "Comma-separated canonical mechanisms (blank = defaults)"
        required: false
        default: ""
      publish_docs:
        description: "Commit and publish the refreshed docs snapshot after a successful build"
        required: false
        default: "false"

permissions:
  contents: write

concurrency:
  group: build-atlas-slices
  cancel-in-progress: false

jobs:
  build-atlas-slices:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Build fresh Drive inventory
        env:
          DRIVE_FOLDER_ID: ${{ secrets.DRIVE_FOLDER_ID }}
          GOOGLE_TOKEN_JSON: ${{ secrets.GOOGLE_TOKEN_JSON }}
          SERVICE_ACCOUNT_JSON: ${{ secrets.SERVICE_ACCOUNT_JSON }}
        run: |
          mkdir -p reports output outputs/state
          python scripts/drive_inventory.py --recursive --download-metadata

      - name: Run post-extraction analysis
        env:
          DRIVE_FOLDER_ID: ${{ secrets.DRIVE_FOLDER_ID }}
          GOOGLE_TOKEN_JSON: ${{ secrets.GOOGLE_TOKEN_JSON }}
          SERVICE_ACCOUNT_JSON: ${{ secrets.SERVICE_ACCOUNT_JSON }}
        run: |
          latest_inventory=$(ls -1t reports/drive_inventory_*.csv | head -n1)
          python scripts/post_extraction_analysis.py --inventory "$latest_inventory" --output-dir reports
          latest_paper_qa=$(ls -1t reports/post_extraction_paper_qa_*.csv | head -n1)
          python scripts/build_investigation_action_queue.py \
            --paper-qa-csv "$latest_paper_qa" \
            --output-dir reports/investigation_queue

      - name: Build atlas slices
        run: |
          latest_claims=$(ls -1t reports/investigation_claims_*.csv | head -n1)
          latest_edges=$(ls -1t reports/investigation_edges_*.csv | head -n1)
          latest_paper_qa=$(ls -1t reports/post_extraction_paper_qa_*.csv | head -n1)
          latest_action_queue=$(ls -1t reports/investigation_queue/investigation_action_queue_*.csv | head -n1)
          if [ -n "${{ inputs.mechanisms }}" ]; then
            python scripts/build_atlas_slices.py \
              --claims-csv "$latest_claims" \
              --edges-csv "$latest_edges" \
              --paper-qa-csv "$latest_paper_qa" \
              --output-dir reports/atlas_slices \
              --mechanisms "${{ inputs.mechanisms }}"
          else
            python scripts/build_atlas_slices.py \
              --claims-csv "$latest_claims" \
              --edges-csv "$latest_edges" \
              --paper-qa-csv "$latest_paper_qa" \
              --output-dir reports/atlas_slices
          fi
          python scripts/build_atlas_backbone.py \
            --claims-csv "$latest_claims" \
            --paper-qa-csv "$latest_paper_qa" \
            --output-dir reports/atlas_backbone
          latest_backbone=$(ls -1t reports/atlas_backbone/atlas_backbone_matrix_*.csv | head -n1)
          latest_anchors=$(ls -1t reports/atlas_backbone/atlas_backbone_anchors_*.csv | head -n1)
          python scripts/build_starter_atlas_packet.py \
            --claims-csv "$latest_claims" \
            --backbone-csv "$latest_backbone" \
            --anchors-csv "$latest_anchors" \
            --action-queue-csv "$latest_action_queue" \
            --output-dir reports/starter_atlas_packet
          latest_packet=$(ls -1t reports/starter_atlas_packet/starter_atlas_packet_*.json | head -n1)
          python scripts/build_atlas_narrative_outline.py \
            --packet-json "$latest_packet" \
            --output-dir reports/atlas_narrative_outline
          python scripts/build_mechanism_evidence_table.py \
            --claims-csv "$latest_claims" \
            --backbone-csv "$latest_backbone" \
            --anchors-csv "$latest_anchors" \
            --paper-qa-csv "$latest_paper_qa" \
            --action-queue-csv "$latest_action_queue" \
            --output-dir reports/mechanism_evidence_table
          python scripts/build_connector_candidate_manifest.py \
            --claims-csv "$latest_claims" \
            --paper-qa-csv "$latest_paper_qa" \
            --action-queue-csv "$latest_action_queue" \
            --backbone-csv "$latest_backbone" \
            --anchors-csv "$latest_anchors" \
            --output-dir reports/connector_candidate_manifest
          latest_outline=$(ls -1t reports/atlas_narrative_outline/atlas_narrative_outline_*.md | head -n1)
          python scripts/build_atlas_narrative_draft.py \
            --packet-json "$latest_packet" \
            --backbone-csv "$latest_backbone" \
            --outline-md "$latest_outline" \
            --output-dir reports/atlas_narrative_draft
          latest_enrichment=$(find reports -type f -name 'connector_enrichment_records_*.csv' | sort | tail -n1)
          if [ -n "$latest_enrichment" ]; then
            python scripts/build_mechanism_dossiers.py \
              --packet-json "$latest_packet" \
              --claims-csv "$latest_claims" \
              --edges-csv "$latest_edges" \
              --paper-qa-csv "$latest_paper_qa" \
              --backbone-csv "$latest_backbone" \
              --anchors-csv "$latest_anchors" \
              --action-queue-csv "$latest_action_queue" \
              --enrichment-csv "$latest_enrichment" \
              --output-dir reports/mechanism_dossiers
          else
            python scripts/build_mechanism_dossiers.py \
              --packet-json "$latest_packet" \
              --claims-csv "$latest_claims" \
              --edges-csv "$latest_edges" \
              --paper-qa-csv "$latest_paper_qa" \
              --backbone-csv "$latest_backbone" \
              --anchors-csv "$latest_anchors" \
              --action-queue-csv "$latest_action_queue" \
              --output-dir reports/mechanism_dossiers
          fi
          python scripts/build_atlas_chapter_from_dossiers.py \
            --dossier-dir reports/mechanism_dossiers \
            --output-dir reports/atlas_chapter_draft
          python scripts/build_atlas_chapter_evidence_ledger.py \
            --dossier-dir reports/mechanism_dossiers \
            --output-dir reports/atlas_chapter_ledger
          latest_ledger=$(ls -1t reports/atlas_chapter_ledger/starter_atlas_chapter_evidence_ledger_*.csv | head -n1)
          latest_bridge=$(ls -1t reports/mechanism_dossiers/translational_bridge_*.csv | head -n1)
          python scripts/build_mechanistic_synthesis.py \
            --ledger-csv "$latest_ledger" \
            --bridge-csv "$latest_bridge" \
            --output-dir reports/mechanistic_synthesis
          latest_synthesis=$(ls -1t reports/mechanistic_synthesis/mechanistic_synthesis_blocks_*.csv | head -n1)
          python scripts/build_atlas_chapter_from_synthesis.py \
            --synthesis-csv "$latest_synthesis" \
            --output-dir reports/atlas_chapter_synthesis_draft
          python scripts/build_atlas_quality_gate.py \
            --output-dir reports/atlas_quality_gate \
            --synthesis-csv "$latest_synthesis"
          latest_quality_gate=$(ls -1t reports/atlas_quality_gate/atlas_quality_gate_*.csv | head -n1)
          python scripts/build_mechanism_review_packets.py \
            --output-dir reports/mechanism_review_packets \
            --quality-gate-csv "$latest_quality_gate" \
            --synthesis-csv "$latest_synthesis"
          python scripts/build_atlas_release_manifest.py \
            --output-dir reports/atlas_release_manifest \
            --quality-gate-csv "$latest_quality_gate"
          latest_release_manifest=$(ls -1t reports/atlas_release_manifest/atlas_release_manifest_*.csv | head -n1)
          python scripts/build_idea_generation_gate.py \
            --output-dir reports/idea_generation_gate \
            --release-manifest-csv "$latest_release_manifest"
          python scripts/build_hypothesis_candidates.py \
            --output-dir reports/hypothesis_candidates
          python scripts/build_idea_briefs.py \
            --output-dir reports/idea_briefs \
            --site-dir docs/idea-briefs
          python scripts/build_process_lanes.py \
            --claims-csv "$latest_claims" \
            --edges-csv "$latest_edges" \
            --paper-qa-csv "$latest_paper_qa" \
            --output-dir reports/process_lanes
          latest_process_json=$(ls -1t reports/process_lanes/process_lane_index_*.json | head -n1)
          python scripts/build_process_lane_validation.py \
            --process-json "$latest_process_json" \
            --output-dir reports/process_lane_validation
          python scripts/build_process_engine_page.py \
            --process-json "$latest_process_json" \
            --output-dir docs/process-engine
          python scripts/build_causal_transitions.py \
            --claims-csv "$latest_claims" \
            --edges-csv "$latest_edges" \
            --paper-qa-csv "$latest_paper_qa" \
            --process-json "$latest_process_json" \
            --synthesis-csv "$latest_synthesis" \
            --output-dir reports/causal_transitions
          latest_transition_json=$(ls -1t reports/causal_transitions/causal_transition_index_*.json | head -n1)
          python scripts/build_causal_transition_validation.py \
            --transition-json "$latest_transition_json" \
            --output-dir reports/causal_transition_validation
          python scripts/build_process_model_page.py \
            --transition-json "$latest_transition_json" \
            --output-dir docs/process-model
          python scripts/build_progression_objects.py \
            --output-dir reports/progression_objects
          latest_progression_json=$(ls -1t reports/progression_objects/progression_object_index_*.json | head -n1)
          python scripts/build_progression_object_validation.py \
            --object-json "$latest_progression_json" \
            --process-json "$latest_process_json" \
            --transition-json "$latest_transition_json" \
            --output-dir reports/progression_object_validation
          python scripts/build_progression_object_page.py \
            --object-json "$latest_progression_json" \
            --output-dir docs/progression-objects
          python scripts/build_translational_perturbation_logic.py \
            --process-json "$latest_process_json" \
            --transition-json "$latest_transition_json" \
            --object-json "$latest_progression_json" \
            --output-dir reports/translational_perturbation
          latest_translational_json=$(ls -1t reports/translational_perturbation/translational_perturbation_index_*.json | head -n1)
          python scripts/build_translational_perturbation_validation.py \
            --translational-json "$latest_translational_json" \
            --process-json "$latest_process_json" \
            --transition-json "$latest_transition_json" \
            --object-json "$latest_progression_json" \
            --output-dir reports/translational_perturbation_validation
          python scripts/build_translational_perturbation_page.py \
            --translational-json "$latest_translational_json" \
            --validation-json "$(ls -1t reports/translational_perturbation_validation/translational_perturbation_validation_*.json | head -n1)" \
            --output-dir docs/translational-logic
          python scripts/build_atlas_viewer.py \
            --output-dir docs/atlas-viewer
          python scripts/build_tbi_atlas_book.py \
            --output-dir reports/starter_tbi_atlas \
            --site-dir docs/atlas-book
          python scripts/build_portal_page.py \
            --output-path docs/index.html
          python scripts/build_run_center_page.py \
            --output-path docs/run-center/index.html
          python scripts/build_program_status_report.py \
            --output-dir reports/program_status \
            --quality-gate-csv "$latest_quality_gate" \
            --idea-gate-csv "$(ls -1t reports/idea_generation_gate/idea_generation_gate_*.csv | head -n1)" \
            --release-manifest-md "$(ls -1t reports/atlas_release_manifest/atlas_release_manifest_*.md | head -n1)" \
            --review-packet-index-md "$(ls -1t reports/mechanism_review_packets/mechanism_review_packet_index_*.md | head -n1)"

      - name: Publish docs snapshot
        if: ${{ inputs.publish_docs == 'true' }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add docs
          if git diff --cached --quiet; then
            echo "No docs changes to publish."
            exit 0
          fi
          git commit -m "Refresh atlas site snapshot"
          git push origin HEAD:main

      - name: Upload atlas artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: atlas_slice_outputs
          path: |
            reports/
            docs/
          retention-days: 7
