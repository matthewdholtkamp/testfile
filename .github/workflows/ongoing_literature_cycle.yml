name: Ongoing Literature Cycle

on:
  workflow_dispatch:
    inputs:
      max_articles_per_run:
        description: "Manual override for MAX_ARTICLES_PER_RUN"
        required: false
        default: "5"
      target_full_text_per_run:
        description: "Manual override for TARGET_FULL_TEXT_PER_RUN"
        required: false
        default: "5"
      upgrade_max_chunks:
        description: "Maximum upgrade-first chunks to process in this cycle (0 = all remaining)"
        required: false
        default: "2"
      extraction_max_passes:
        description: "Maximum extraction finisher passes in this cycle"
        required: false
        default: "5"
      steering_priority_mode:
        description: "Steering-aware priority mode for downstream ranking and connector focus"
        required: false
        default: "default"
      steering_focus_mechanisms:
        description: "Comma-separated favored canonical mechanisms"
        required: false
        default: ""
      steering_focus_endotypes:
        description: "Comma-separated favored endotypes"
        required: false
        default: ""
      steering_evidence_mode:
        description: "Current steering evidence mode"
        required: false
        default: "balanced"
      steering_pending_actions:
        description: "Comma-separated pending machine actions"
        required: false
        default: ""
  schedule:
    - cron: "0 13 * * *"

concurrency:
  group: ongoing-literature-cycle
  cancel-in-progress: false

jobs:
  literature-cycle:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Resolve steering context from repo state
        env:
          MANUAL_STEERING_PRIORITY_MODE: ${{ inputs.steering_priority_mode }}
          MANUAL_STEERING_FOCUS_MECHANISMS: ${{ inputs.steering_focus_mechanisms }}
          MANUAL_STEERING_FOCUS_ENDOTYPES: ${{ inputs.steering_focus_endotypes }}
          MANUAL_STEERING_EVIDENCE_MODE: ${{ inputs.steering_evidence_mode }}
          MANUAL_STEERING_PENDING_ACTIONS: ${{ inputs.steering_pending_actions }}
        run: |
          python - <<'PY'
          import json
          import os
          from pathlib import Path

          path = Path('outputs/state/engine_direction_registry.json')
          data = {}
          if path.exists():
            data = json.loads(path.read_text(encoding='utf-8'))

          def listify(value):
            if isinstance(value, list):
              return [str(item).strip() for item in value if str(item).strip()]
            text = str(value or '').strip()
            if not text:
              return []
            return [part.strip() for part in text.split(',') if part.strip()]

          env_updates = {
            'STEERING_PRIORITY_MODE': os.environ.get('MANUAL_STEERING_PRIORITY_MODE') or '',
            'STEERING_FOCUS_MECHANISMS': os.environ.get('MANUAL_STEERING_FOCUS_MECHANISMS') or ','.join(listify(data.get('favored_mechanisms'))),
            'STEERING_FOCUS_ENDOTYPES': os.environ.get('MANUAL_STEERING_FOCUS_ENDOTYPES') or ','.join(listify(data.get('favored_endotypes'))),
            'STEERING_EVIDENCE_MODE': os.environ.get('MANUAL_STEERING_EVIDENCE_MODE') or str(data.get('evidence_mode') or 'balanced'),
            'STEERING_PENDING_ACTIONS': os.environ.get('MANUAL_STEERING_PENDING_ACTIONS') or ','.join(listify(data.get('pending_machine_actions'))),
          }

          with open(os.environ['GITHUB_ENV'], 'a', encoding='utf-8') as handle:
            for key, value in env_updates.items():
              handle.write(f'{key}={value}\\n')
          PY

      - name: Run retrieval cycle
        env:
          RETRIEVAL_MODE_OVERRIDE: legacy
          MAX_ARTICLES_PER_RUN_OVERRIDE: ${{ inputs.max_articles_per_run }}
          TARGET_FULL_TEXT_PER_RUN_OVERRIDE: ${{ inputs.target_full_text_per_run }}
          DRIVE_FOLDER_ID: ${{ secrets.DRIVE_FOLDER_ID }}
          GOOGLE_TOKEN_JSON: ${{ secrets.GOOGLE_TOKEN_JSON }}
          SERVICE_ACCOUNT_JSON: ${{ secrets.SERVICE_ACCOUNT_JSON }}
          NCBI_API_KEY: ${{ secrets.NCBI_API_KEY }}
          UNPAYWALL_EMAIL: ${{ secrets.UNPAYWALL_EMAIL }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          EXTRACTION_RATE_LIMIT_MODE: adaptive
        run: |
          mkdir -p reports output outputs/state
          UPGRADE_CHUNKS="${{ inputs.upgrade_max_chunks }}"
          EXTRACT_PASSES="${{ inputs.extraction_max_passes }}"
          if [ -z "$UPGRADE_CHUNKS" ]; then
            UPGRADE_CHUNKS=2
          fi
          if [ -z "$EXTRACT_PASSES" ]; then
            EXTRACT_PASSES=5
          fi
          if [ "$STEERING_EVIDENCE_MODE" = "advance" ] && [ -n "$STEERING_FOCUS_MECHANISMS" ]; then
            EXTRACT_PASSES=$((EXTRACT_PASSES + 1))
          fi
          cat > outputs/state/ongoing_cycle_steering_context.json <<EOF
          {
            "steering_priority_mode": "${STEERING_PRIORITY_MODE}",
            "steering_focus_mechanisms": "${STEERING_FOCUS_MECHANISMS}",
            "steering_focus_endotypes": "${STEERING_FOCUS_ENDOTYPES}",
            "steering_evidence_mode": "${STEERING_EVIDENCE_MODE}",
            "steering_pending_actions": "${STEERING_PENDING_ACTIONS}"
          }
          EOF
          python scripts/run_pipeline.py
          python scripts/drain_upgrade_queue.py --chunk-size 10 --max-chunks "$UPGRADE_CHUNKS"
          python scripts/finish_extraction_phase.py --max-passes "$EXTRACT_PASSES" --batch-size 0 --ready-only
          latest_inventory=$(ls -1t reports/drive_inventory_*.csv | head -n1)
          python scripts/post_extraction_analysis.py --inventory "$latest_inventory" --output-dir reports
          python scripts/materialize_drive_sidecar_db.py \
            --inventory-csv "$latest_inventory" \
            --pipeline-state-json output/pipeline_state.json \
            --output-path outputs/state/corpus_index.sqlite3
          latest_paper_qa=$(ls -1t reports/post_extraction_paper_qa_*.csv | head -n1)
          python scripts/build_investigation_action_queue.py \
            --paper-qa-csv "$latest_paper_qa" \
            --output-dir reports/investigation_queue
          latest_claims=$(ls -1t reports/investigation_claims_*.csv | head -n1)
          python scripts/build_atlas_backbone.py \
            --claims-csv "$latest_claims" \
            --paper-qa-csv "$latest_paper_qa" \
            --output-dir reports/atlas_backbone

      - name: Upload cycle artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ongoing_literature_cycle_outputs
          path: |
            reports/
            output/
            outputs/state/
