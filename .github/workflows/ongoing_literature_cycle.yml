name: Ongoing Literature Cycle

on:
  workflow_dispatch:
    inputs:
      max_articles_per_run:
        description: "Manual override for MAX_ARTICLES_PER_RUN"
        required: false
        default: "5"
      target_full_text_per_run:
        description: "Manual override for TARGET_FULL_TEXT_PER_RUN"
        required: false
        default: "5"
      upgrade_max_chunks:
        description: "Maximum upgrade-first chunks to process in this cycle (0 = all remaining)"
        required: false
        default: "2"
      extraction_max_passes:
        description: "Maximum extraction finisher passes in this cycle"
        required: false
        default: "5"
  schedule:
    - cron: "0 13 * * *"

concurrency:
  group: ongoing-literature-cycle
  cancel-in-progress: false

jobs:
  literature-cycle:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run retrieval cycle
        env:
          RETRIEVAL_MODE_OVERRIDE: legacy
          MAX_ARTICLES_PER_RUN_OVERRIDE: ${{ inputs.max_articles_per_run }}
          TARGET_FULL_TEXT_PER_RUN_OVERRIDE: ${{ inputs.target_full_text_per_run }}
          DRIVE_FOLDER_ID: ${{ secrets.DRIVE_FOLDER_ID }}
          GOOGLE_TOKEN_JSON: ${{ secrets.GOOGLE_TOKEN_JSON }}
          SERVICE_ACCOUNT_JSON: ${{ secrets.SERVICE_ACCOUNT_JSON }}
          NCBI_API_KEY: ${{ secrets.NCBI_API_KEY }}
          UNPAYWALL_EMAIL: ${{ secrets.UNPAYWALL_EMAIL }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: |
          mkdir -p reports output outputs/state
          UPGRADE_CHUNKS="${{ inputs.upgrade_max_chunks }}"
          EXTRACT_PASSES="${{ inputs.extraction_max_passes }}"
          if [ -z "$UPGRADE_CHUNKS" ]; then
            UPGRADE_CHUNKS=2
          fi
          if [ -z "$EXTRACT_PASSES" ]; then
            EXTRACT_PASSES=5
          fi
          python scripts/run_pipeline.py
          python scripts/drain_upgrade_queue.py --chunk-size 10 --max-chunks "$UPGRADE_CHUNKS"
          python scripts/finish_extraction_phase.py --max-passes "$EXTRACT_PASSES" --batch-size 0 --ready-only
          latest_inventory=$(ls -1t reports/drive_inventory_*.csv | head -n1)
          python scripts/post_extraction_analysis.py --inventory "$latest_inventory" --output-dir reports
          latest_paper_qa=$(ls -1t reports/post_extraction_paper_qa_*.csv | head -n1)
          python scripts/build_investigation_action_queue.py \
            --paper-qa-csv "$latest_paper_qa" \
            --output-dir reports/investigation_queue
          latest_claims=$(ls -1t reports/investigation_claims_*.csv | head -n1)
          python scripts/build_atlas_backbone.py \
            --claims-csv "$latest_claims" \
            --paper-qa-csv "$latest_paper_qa" \
            --output-dir reports/atlas_backbone

      - name: Upload cycle artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ongoing_literature_cycle_outputs
          path: |
            reports/
            output/
            outputs/state/
