name: Manual PubMed Extraction Pipeline

"on":
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Run in dry-run mode (discover files, do not extract or upload)"
        required: false
        type: boolean
        default: false
      include_needs_review:
        description: "Include papers with status 'needs_review'"
        required: false
        type: boolean
        default: false

jobs:
  run-extraction:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt google-generativeai jsonschema

      - name: Run Extraction Script
        env:
          DRIVE_FOLDER_ID: ${{ secrets.DRIVE_FOLDER_ID }}
          SERVICE_ACCOUNT_JSON: ${{ secrets.SERVICE_ACCOUNT_JSON }}
          GOOGLE_TOKEN_JSON: ${{ secrets.GOOGLE_TOKEN_JSON }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: |
          ARGS=""
          if [ "${{ inputs.dry_run }}" == "true" ]; then
            ARGS="$ARGS --dry-run"
          fi
          if [ "${{ inputs.include_needs_review }}" == "true" ]; then
            ARGS="$ARGS --include-needs-review"
          fi
          python scripts/run_extraction.py $ARGS

      - name: Upload Local Artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: extraction-run-outputs
          path: outputs/
          retention-days: 7