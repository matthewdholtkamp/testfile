name: Weekly Human Review Packet

on:
  workflow_dispatch:
    inputs:
      source_run_id:
        description: "Optional source run id (blank = latest successful public-enrichment or atlas-refresh run)"
        required: false
        default: ""
      publish_docs:
        description: "Commit and publish refreshed docs snapshot with the Saturday decision brief"
        required: false
        default: "true"
  schedule:
    - cron: "30 14 * * 6"

permissions:
  actions: read
  contents: write

concurrency:
  group: weekly-human-review-packet
  cancel-in-progress: true

jobs:
  weekly-review-packet:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Resolve source run id
        id: resolve
        env:
          GH_TOKEN: ${{ github.token }}
          REPO: ${{ github.repository }}
          INPUT_RUN_ID: ${{ inputs.source_run_id }}
        run: |
          if [ -n "$INPUT_RUN_ID" ]; then
            RUN_ID="$INPUT_RUN_ID"
          else
            RUN_ID=$(gh run list -R "$REPO" -L 40 --json databaseId,conclusion,status,workflowName | python3 -c 'import json, sys; runs=json.load(sys.stdin); preferred=("Refresh Public Enrichment","Refresh Atlas From Ongoing Cycle","Build Atlas Slices"); print(next((str(run["databaseId"]) for wf in preferred for run in runs if run.get("workflowName")==wf and run.get("status")=="completed" and run.get("conclusion")=="success"), ""))')
          fi
          if [ -z "$RUN_ID" ]; then
            echo "Could not resolve source run id" >&2
            exit 1
          fi
          echo "run_id=$RUN_ID" >> "$GITHUB_OUTPUT"

      - name: Download latest atlas/public-enrichment artifacts
        env:
          GH_TOKEN: ${{ github.token }}
          REPO: ${{ github.repository }}
          RUN_ID: ${{ steps.resolve.outputs.run_id }}
        run: |
          rm -rf imported_review
          mkdir -p imported_review reports docs
          if gh run download "$RUN_ID" -R "$REPO" -n refreshed_public_enrichment_outputs -D imported_review; then
            echo "Downloaded refreshed_public_enrichment_outputs"
          elif gh run download "$RUN_ID" -R "$REPO" -n refreshed_atlas_outputs -D imported_review; then
            echo "Downloaded refreshed_atlas_outputs"
          else
            gh run download "$RUN_ID" -R "$REPO" -n atlas_slice_outputs -D imported_review
          fi
          cp -R imported_review/reports/. reports/ || true
          cp -R imported_review/docs/. docs/ || true

      - name: Build weekly human review packet
        run: |
          python scripts/build_process_lanes.py \
            --output-dir reports/process_lanes
          latest_process_json=$(ls -1t reports/process_lanes/process_lane_index_*.json | head -n1)
          python scripts/build_process_lane_validation.py \
            --process-json "$latest_process_json" \
            --output-dir reports/process_lane_validation
          python scripts/build_process_engine_page.py \
            --process-json "$latest_process_json" \
            --output-dir docs/process-engine
          python scripts/build_causal_transitions.py \
            --process-json "$latest_process_json" \
            --output-dir reports/causal_transitions
          latest_transition_json=$(ls -1t reports/causal_transitions/causal_transition_index_*.json | head -n1)
          python scripts/build_causal_transition_validation.py \
            --transition-json "$latest_transition_json" \
            --output-dir reports/causal_transition_validation
          python scripts/build_process_model_page.py \
            --transition-json "$latest_transition_json" \
            --output-dir docs/process-model
          python scripts/build_weekly_human_review_packet.py \
            --output-dir reports/weekly_human_review_packet \
            --process-lanes-json "$latest_process_json" \
            --causal-transition-json "$latest_transition_json"
          python scripts/build_atlas_viewer.py \
            --output-dir docs/atlas-viewer
          python scripts/build_portal_page.py \
            --output-path docs/index.html
          python scripts/validate_board_state.py

      - name: Publish docs snapshot
        if: ${{ github.event_name == 'schedule' || inputs.publish_docs == 'true' }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add docs
          if git diff --cached --quiet; then
            echo "No docs changes to publish."
            exit 0
          fi
          git commit -m "Refresh Saturday decision brief snapshot"
          git push origin HEAD:main

      - name: Upload weekly review artifacts
        uses: actions/upload-artifact@v4
        with:
          name: weekly_human_review_packet
          path: |
            reports/weekly_human_review_packet/
            reports/program_status/
            reports/atlas_release_manifest/
            docs/atlas-viewer/
