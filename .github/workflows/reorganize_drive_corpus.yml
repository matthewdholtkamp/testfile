name: Reorganize Drive Corpus

on:
  workflow_dispatch:
    inputs:
      apply_changes:
        description: "Apply the Drive move plan (false = dry run only)"
        required: false
        default: "true"
      move_limit:
        description: "Optional max number of moves (0 = all planned moves)"
        required: false
        default: "0"

jobs:
  reorganize-drive-corpus:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Build fresh Drive inventory
        env:
          DRIVE_FOLDER_ID: ${{ secrets.DRIVE_FOLDER_ID }}
          GOOGLE_TOKEN_JSON: ${{ secrets.GOOGLE_TOKEN_JSON }}
          SERVICE_ACCOUNT_JSON: ${{ secrets.SERVICE_ACCOUNT_JSON }}
        run: |
          mkdir -p reports
          python scripts/drive_inventory.py --recursive --download-metadata
          latest_inventory=$(ls -1t reports/drive_inventory_*.csv | head -n1)
          python scripts/analyze_drive_inventory.py --inventory "$latest_inventory" --output-dir reports

      - name: Reorganize Drive corpus
        env:
          DRIVE_FOLDER_ID: ${{ secrets.DRIVE_FOLDER_ID }}
          GOOGLE_TOKEN_JSON: ${{ secrets.GOOGLE_TOKEN_JSON }}
          SERVICE_ACCOUNT_JSON: ${{ secrets.SERVICE_ACCOUNT_JSON }}
        run: |
          latest_inventory=$(ls -1t reports/drive_inventory_*.csv | head -n1)
          if [ "${{ inputs.apply_changes }}" = "true" ]; then
            python scripts/reorganize_drive_corpus.py --inventory "$latest_inventory" --output-dir reports --apply --limit "${{ inputs.move_limit }}"
          else
            python scripts/reorganize_drive_corpus.py --inventory "$latest_inventory" --output-dir reports --limit "${{ inputs.move_limit }}"
          fi

      - name: Build post-move Drive inventory
        if: always()
        env:
          DRIVE_FOLDER_ID: ${{ secrets.DRIVE_FOLDER_ID }}
          GOOGLE_TOKEN_JSON: ${{ secrets.GOOGLE_TOKEN_JSON }}
          SERVICE_ACCOUNT_JSON: ${{ secrets.SERVICE_ACCOUNT_JSON }}
        run: |
          python scripts/drive_inventory.py --recursive --download-metadata
          latest_inventory=$(ls -1t reports/drive_inventory_*.csv | head -n1)
          python scripts/analyze_drive_inventory.py --inventory "$latest_inventory" --output-dir reports

      - name: Upload drive reorganization artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: drive_reorganization
          path: reports/
