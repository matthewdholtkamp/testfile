name: Follow Up Publish Chain

on:
  workflow_run:
    workflows: ["Ongoing Literature Cycle"]
    types:
      - completed

permissions:
  actions: write
  contents: read

concurrency:
  group: follow-up-publish-chain-${{ github.event.workflow_run.id }}
  cancel-in-progress: false

jobs:
  follow-up:
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest

    steps:
      - name: Wait for downstream publish chain
        id: monitor
        env:
          GH_TOKEN: ${{ github.token }}
          REPO: ${{ github.repository }}
          SOURCE_RUN_ID: ${{ github.event.workflow_run.id }}
          SOURCE_HEAD_SHA: ${{ github.event.workflow_run.head_sha }}
          SOURCE_CREATED_AT: ${{ github.event.workflow_run.created_at }}
        run: |
          set -euo pipefail
          python - <<'PY'
          import json
          import os
          import subprocess
          import sys
          import time
          from datetime import datetime, timezone

          repo = os.environ["REPO"]
          source_run_id = str(os.environ["SOURCE_RUN_ID"])
          source_head_sha = os.environ["SOURCE_HEAD_SHA"]
          source_created_at = os.environ["SOURCE_CREATED_AT"]

          def parse_time(value: str) -> datetime:
            text = value.strip()
            if text.endswith("Z"):
              text = text[:-1] + "+00:00"
            return datetime.fromisoformat(text).astimezone(timezone.utc)

          def gh_json(*args):
            result = subprocess.run(
              ["gh", *args],
              check=True,
              text=True,
              capture_output=True,
            )
            return json.loads(result.stdout)

          def list_runs(workflow_name: str):
            return gh_json(
              "run",
              "list",
              "-R",
              repo,
              "--workflow",
              workflow_name,
              "-L",
              "30",
              "--json",
              "databaseId,status,conclusion,createdAt,headSha,url,event",
            )

          def select_run(workflow_name: str, not_before: datetime):
            candidates = []
            for run in list_runs(workflow_name):
              if run.get("headSha") != source_head_sha:
                continue
              created = parse_time(run["createdAt"])
              if created < not_before:
                continue
              candidates.append((created, run))
            if not candidates:
              return None
            candidates.sort(key=lambda item: item[0], reverse=True)
            return candidates[0][1]

          def wait_for_run(workflow_name: str, not_before: datetime, timeout_minutes: int = 45):
            deadline = time.time() + timeout_minutes * 60
            selected = None
            while time.time() < deadline:
              selected = select_run(workflow_name, not_before)
              if selected and selected.get("status") == "completed":
                return selected
              time.sleep(15)
            if selected:
              return selected
            raise SystemExit(f"Timed out waiting for {workflow_name} after source run {source_run_id}.")

          source_created = parse_time(source_created_at)
          atlas_run = wait_for_run("Refresh Atlas From Ongoing Cycle", source_created)
          public_run = wait_for_run("Refresh Public Enrichment", parse_time(atlas_run["createdAt"]))

          output = {
            "source_run": {
              "databaseId": source_run_id,
              "headSha": source_head_sha,
              "createdAt": source_created_at,
            },
            "refresh_atlas_run": atlas_run,
            "refresh_public_run": public_run,
          }
          with open(os.environ["GITHUB_OUTPUT"], "a", encoding="utf-8") as handle:
            handle.write(f"atlas_run_id={atlas_run['databaseId']}\n")
            handle.write(f"atlas_conclusion={atlas_run.get('conclusion','')}\n")
            handle.write(f"public_run_id={public_run['databaseId']}\n")
            handle.write(f"public_conclusion={public_run.get('conclusion','')}\n")
          with open("publish_chain_status.json", "w", encoding="utf-8") as handle:
            json.dump(output, handle, indent=2)
          PY

      - name: Retry Refresh Public Enrichment once if needed
        id: retry
        if: ${{ steps.monitor.outputs.public_conclusion != 'success' }}
        env:
          GH_TOKEN: ${{ github.token }}
          REPO: ${{ github.repository }}
          ATLAS_RUN_ID: ${{ steps.monitor.outputs.atlas_run_id }}
          SOURCE_HEAD_SHA: ${{ github.event.workflow_run.head_sha }}
        run: |
          set -euo pipefail
          gh workflow run refresh_public_enrichment.yml \
            -R "$REPO" \
            -f source_run_id="$ATLAS_RUN_ID" \
            -f publish_docs="true"

          python - <<'PY'
          import json
          import os
          import subprocess
          import time
          from datetime import datetime, timezone

          repo = os.environ["REPO"]
          source_head_sha = os.environ["SOURCE_HEAD_SHA"]

          def parse_time(value: str) -> datetime:
            text = value.strip()
            if text.endswith("Z"):
              text = text[:-1] + "+00:00"
            return datetime.fromisoformat(text).astimezone(timezone.utc)

          def gh_json(*args):
            result = subprocess.run(
              ["gh", *args],
              check=True,
              text=True,
              capture_output=True,
            )
            return json.loads(result.stdout)

          dispatch_started = datetime.now(timezone.utc)
          deadline = time.time() + 45 * 60
          selected = None
          while time.time() < deadline:
            runs = gh_json(
              "run",
              "list",
              "-R",
              repo,
              "--workflow",
              "refresh_public_enrichment.yml",
              "-L",
              "30",
              "--json",
              "databaseId,status,conclusion,createdAt,headSha,url,event",
            )
            candidates = []
            for run in runs:
              if run.get("headSha") != source_head_sha:
                continue
              created = parse_time(run["createdAt"])
              if created < dispatch_started:
                continue
              candidates.append((created, run))
            if candidates:
              candidates.sort(key=lambda item: item[0], reverse=True)
              selected = candidates[0][1]
              if selected.get("status") == "completed":
                break
            time.sleep(15)

          if not selected:
            raise SystemExit("Timed out waiting for the retry Refresh Public Enrichment run to appear.")

          with open("publish_chain_retry_status.json", "w", encoding="utf-8") as handle:
            json.dump(selected, handle, indent=2)
          with open(os.environ["GITHUB_OUTPUT"], "a", encoding="utf-8") as handle:
            handle.write(f"retry_run_id={selected['databaseId']}\n")
            handle.write(f"retry_conclusion={selected.get('conclusion','')}\n")
          PY

      - name: Collect failed logs
        if: ${{ steps.monitor.outputs.public_conclusion != 'success' && steps.retry.outputs.retry_conclusion != 'success' }}
        env:
          GH_TOKEN: ${{ github.token }}
          REPO: ${{ github.repository }}
          FAILED_RUN_ID: ${{ steps.retry.outputs.retry_run_id || steps.monitor.outputs.public_run_id }}
        run: |
          set -euo pipefail
          mkdir -p publish_chain_failure_logs
          gh run view "$FAILED_RUN_ID" -R "$REPO" --log-failed > publish_chain_failure_logs/refresh_public_enrichment_failed.log || true

      - name: Upload follow-up artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: publish_chain_follow_up_${{ github.event.workflow_run.id }}
          path: |
            publish_chain_status.json
            publish_chain_retry_status.json
            publish_chain_failure_logs/

      - name: Fail if publish chain still failed after retry
        if: ${{ steps.monitor.outputs.public_conclusion != 'success' && steps.retry.outputs.retry_conclusion != 'success' }}
        run: |
          echo "Refresh Public Enrichment still failed after one automatic retry." >&2
          exit 1
