name: Post-Extraction Analysis

on:
  workflow_dispatch:
    inputs:
      include_off_topic:
        description: "Include off-topic papers in the paper QA table"
        required: false
        type: boolean
        default: false

concurrency:
  group: post-extraction-analysis
  cancel-in-progress: false

jobs:
  post-extraction-analysis:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Build fresh Drive inventory
        env:
          DRIVE_FOLDER_ID: ${{ secrets.DRIVE_FOLDER_ID }}
          GOOGLE_TOKEN_JSON: ${{ secrets.GOOGLE_TOKEN_JSON }}
          SERVICE_ACCOUNT_JSON: ${{ secrets.SERVICE_ACCOUNT_JSON }}
        run: |
          mkdir -p reports output outputs/state
          python scripts/drive_inventory.py --recursive --download-metadata

      - name: Run post-extraction analysis
        env:
          DRIVE_FOLDER_ID: ${{ secrets.DRIVE_FOLDER_ID }}
          GOOGLE_TOKEN_JSON: ${{ secrets.GOOGLE_TOKEN_JSON }}
          SERVICE_ACCOUNT_JSON: ${{ secrets.SERVICE_ACCOUNT_JSON }}
        run: |
          latest_inventory=$(ls -1t reports/drive_inventory_*.csv | head -n1)
          ARGS="--inventory $latest_inventory --output-dir reports"
          if [ "${{ inputs.include_off_topic }}" = "true" ]; then
            ARGS="$ARGS --include-off-topic"
          fi
          python scripts/post_extraction_analysis.py $ARGS
          latest_paper_qa=$(ls -1t reports/post_extraction_paper_qa_*.csv | head -n1)
          python scripts/build_investigation_action_queue.py \
            --paper-qa-csv "$latest_paper_qa" \
            --output-dir reports/investigation_queue
          latest_claims=$(ls -1t reports/investigation_claims_*.csv | head -n1)
          latest_action_queue=$(ls -1t reports/investigation_queue/investigation_action_queue_*.csv | head -n1)
          python scripts/build_atlas_backbone.py \
            --claims-csv "$latest_claims" \
            --paper-qa-csv "$latest_paper_qa" \
            --output-dir reports/atlas_backbone
          latest_backbone=$(ls -1t reports/atlas_backbone/atlas_backbone_matrix_*.csv | head -n1)
          latest_anchors=$(ls -1t reports/atlas_backbone/atlas_backbone_anchors_*.csv | head -n1)
          python scripts/build_connector_candidate_manifest.py \
            --claims-csv "$latest_claims" \
            --paper-qa-csv "$latest_paper_qa" \
            --action-queue-csv "$latest_action_queue" \
            --backbone-csv "$latest_backbone" \
            --anchors-csv "$latest_anchors" \
            --output-dir reports/connector_candidate_manifest

      - name: Upload post-extraction artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: post_extraction_analysis_outputs
          path: |
            reports/
          retention-days: 7
